<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deyan Tsvyatkov</title>
  <link rel="icon" type="image/png" href="flavicon%20d-1.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --overlay-color: #2a1f14;
      --bg-color: #ccc5ba;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-color);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Outer stage wraps name + grid together */
    #stage {
      position: relative;
    }

    /* Name — above grid, left-aligned to grid edge */
    #name {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(18px, 2.2vw, 36px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      word-spacing: 0.35em;
      color: #3d2f1e;
      opacity: 0;
      white-space: nowrap;
      user-select: none;
      position: absolute;
      left: 50%;
      bottom: calc(100% + 68px);
      will-change: transform, opacity;
      z-index: 30;
    }

    #name-inner {
      display: inline-block;
      will-change: transform;
      transform-origin: center center;
    }

    #subtitle, #subtitle-about {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(12px, 1vw, 16px);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #3d2f1e;
      opacity: 0;
      white-space: nowrap;
      user-select: none;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(100% + 30px);
      will-change: transform, opacity;
      z-index: 30;
    }

    /* Portrait */
    #portrait-wrap {
      position: relative;
      width: calc(47.61vh * 1.7778);
      height: 47.61vh;
    }

    /* Portrait video — covers tile grid during assembled state, fades out during scatter */
    #portrait-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 3;
      pointer-events: none;
    }

    /* 3×3 tile grid */
    #tile-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 0;
      transition: filter 0.15s ease;
    }

    /* Single assembled-portrait overlay — eliminates all tile seam artifacts.
       Fades out as scatter progresses (--assembled-opacity driven by RAF). */
    #tile-grid::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: var(--portrait-src, none);
      background-size: 100% 100%;
      background-repeat: no-repeat;
      pointer-events: none;
      z-index: 2;
      opacity: var(--assembled-opacity, 1);
    }

    .tile {
      position: relative;
      overflow: hidden;
      cursor: default;
      background-size: 300% 300%;
      background-repeat: no-repeat;
      border-radius: 0px;
      transition: border-radius 0.7s cubic-bezier(0.22, 1, 0.36, 1), filter 1s ease;
      will-change: translate, scale;
    }

    .tile.scattered {
      border-radius: 8px;
      cursor: pointer;
    }

    /* 3×3 background positions — on .tile itself to avoid sub-pixel gaps */
    .tile[data-col="0"][data-row="0"] { background-position:   0%   0%; }
    .tile[data-col="1"][data-row="0"] { background-position:  50%   0%; }
    .tile[data-col="2"][data-row="0"] { background-position: 100%   0%; }
    .tile[data-col="0"][data-row="1"] { background-position:   0%  50%; }
    .tile[data-col="1"][data-row="1"] { background-position:  50%  50%; }
    .tile[data-col="2"][data-row="1"] { background-position: 100%  50%; }
    .tile[data-col="0"][data-row="2"] { background-position:   0% 100%; }
    .tile[data-col="1"][data-row="2"] { background-position:  50% 100%; }
    .tile[data-col="2"][data-row="2"] { background-position: 100% 100%; }

    /* Video container — sits on top of .tile's background, no bg of its own */
    .tile-inner {
      position: absolute;
      inset: 0;
    }

    /* Video opacity driven directly by scatter RAF — no CSS transition needed */
    .tile-inner video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
    }

    /* Dark overlay per tile */
    .tile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--overlay-color);
      opacity: 0;
      border-radius: inherit;
      transition: opacity 0.6s ease;
      pointer-events: none;
      z-index: 1;
    }

    /* overlay stays at opacity: 0 — darkening effect removed */

    /* Row label — flies in from the left when a tile in that row is hovered */
    .row-label {
      position: fixed;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(11px, 1.1vw, 15px);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      word-spacing: 0.2em;
      color: #3d2f1e;
      white-space: nowrap;
      opacity: 0;
      transform: translate(-100px, -50%);
      transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
      pointer-events: none;
      z-index: 10;
    }
    .row-label.visible {
      opacity: 1;
      transform: translate(0, -50%);
    }

    /* Project page title block — sits in the scroll flow, below the video */
    #project-title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 40px 24px 14px;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
    }
    #project-page-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(18px, 2.2vw, 36px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      word-spacing: 0.35em;
      color: #3d2f1e;
      white-space: nowrap;
      user-select: none;
    }
    #project-page-subtitle {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #6a6a6a;
      white-space: nowrap;
    }

    #project-content {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(15px, 1.3vw, 19px);
      line-height: 1.75;
      color: #3d2f1e;
    }
    #project-content p { margin-bottom: 1.1em; margin-top: 0; }
    #project-content p:last-child { margin-bottom: 0; }
    #project-content a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: rgba(61,47,30,0.4);
      transition: text-decoration-color 0.2s ease;
    }
    #project-content a:hover { text-decoration-color: rgba(61,47,30,1); }

    /* Credits pinned to the left of the video */
    #project-credits-left {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(11px, 0.82vw, 13px);
      line-height: 1.75;
      color: #3d2f1e;
      text-align: right;
    }
    #project-credits-left p { margin-bottom: 2px; }
    .credits-panel-title {
      font-size: clamp(26px, 3vw, 46px);
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #3d2f1e;
      line-height: 1.1;
      white-space: nowrap;
      margin-bottom: 40px !important;
      position: relative;
    }
    .credits-panel-title .title-main { text-transform: uppercase; }
    .credits-panel-title .title-sub  {
      font-size: 0.62em;
      letter-spacing: 0.08em;
      color: #8a8a8a;
      text-transform: none;
    }
    .credit-role { color: #8a8a8a; }
    .credit-name { color: #3d2f1e; }

    /* Two-column layout below fullscreen video — shifted left */
    .project-below {
      display: flex;
      align-items: center;
      gap: 42px;
      padding: 34px 0 48px;
      width: 72%;
      margin-left: 7%;
      margin-right: 21%;
      box-sizing: border-box;
    }
    .project-below-left, .project-below-right { flex: 1; padding-top: 0; margin-top: 0; }
    .project-below-left {
      text-align: right;
      font-size: clamp(10px, 0.75vw, 12px);
      line-height: 1.5;
    }
    .project-below-left p { margin-bottom: 1px; margin-top: 0; }

    /* Description centered below the video */
    .project-subheader {
      font-size: clamp(16px, 1.35vw, 21px);
      font-style: italic;
      line-height: 1.55;
      margin-bottom: 20px;
    }
    .project-body {
      font-size: clamp(14px, 1.1vw, 17px);
      line-height: 1.8;
      margin-bottom: 14px;
    }
    .project-body:last-child { margin-bottom: 0; }

    /* Footer — driven by applyScatter on the grid; scrollable on project pages */
    #site-footer {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 22px;
      align-items: center;
      opacity: 0;
      z-index: 55;
      pointer-events: none;
    }
    #site-footer a, .project-footer a {
      color: #3d2f1e;
      display: flex;
      align-items: center;
      opacity: 0.55;
      transition: opacity 0.2s ease;
      text-decoration: none;
    }
    #site-footer a:hover, .project-footer a:hover { opacity: 1; }
    .project-footer {
      display: flex;
      justify-content: center;
      gap: 22px;
      padding: 24px 0 48px;
    }

    #mobile-row-label {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(10px, 2.5vw, 13px);
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #3d2f1e;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
    }
    #mobile-row-label.visible { opacity: 1; }
    .mrl-text {
      display: block;
      opacity: 0;
      transform: scale(0.72);
    }
    #mobile-row-label.visible .mrl-text {
      animation: mrlTextIn 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .mrl-line {
      display: block;
      height: 1px;
      width: 100%;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: center;
    }
    #mobile-row-label.visible .mrl-line {
      animation: mrlLineIn 0.32s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }
    #mobile-row-label.hiding .mrl-line {
      animation: mrlLineOut 0.25s ease-in 0s both;
    }
    #mobile-row-label.hiding .mrl-text {
      animation: mrlTextOut 0.3s ease-in 0.2s both;
    }
    @keyframes mrlTextIn {
      from { opacity: 0; transform: scale(0.72); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes mrlLineIn {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    @keyframes mrlTextOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.72); }
    }
    @keyframes mrlLineOut {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* ── Tablet (touch, 769–1200 px) ────────────────────────── */
    @media (pointer: coarse) and (min-width: 769px) and (max-width: 1200px) {
      #portrait-wrap {
        width:  calc(35vh * 1.501) !important;
        height: 35vh !important;
        transform: scale(0.7);
        transform-origin: center center;
      }
      #stage { width: calc(35vh * 1.501); margin: 0 auto; }
      .row-label { display: none; }
    }

    /* ── Mobile ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Portrait sized for a compact 3-column layout */
      #portrait-wrap {
        width:  calc(51.84vw * 1.501) !important;
        height: 51.84vw !important;
      }
      /* Centre stage so portrait and title are centred */
      #stage { margin: 0 auto; width: calc(51.84vw * 1.501); transform: translateY(-10%); }

      /* 3-column grid — 3px gap both directions */
      #tile-grid { gap: 3px !important; }

      /* Row labels don't make sense without hover */
      .row-label { display: none; }

      #project-title-block { padding: 40px 24px 14px; }

      /* Project page — single column: title → subtitle → description → credits */
      .project-below-mobile {
        padding: 36px 20px 32px;
        font-family: 'EB Garamond', Georgia, serif;
        color: #3d2f1e;
      }
      .project-below-mobile .credits-panel-title {
        left: 0 !important;
        margin-bottom: 56px !important;  /* title → subtitle */
        font-size: clamp(22px, 7vw, 34px);
      }
      .project-below-mobile .project-subheader { font-size: clamp(16px, 4.5vw, 22px); margin-bottom: 40px; } /* subtitle → description */
      .project-below-mobile .project-body     { font-size: clamp(14px, 4vw, 18px);   margin-bottom: 12px; }
      .project-credits-mobile { margin-top: 64px; font-size: clamp(11px, 3vw, 14px); line-height: 1.6; } /* description → credits */
      .project-credits-mobile p { margin-bottom: 2px; }
      .project-credits-mobile .credit-role { color: #8a8a8a; }
      .project-credits-mobile .credit-name { color: #3d2f1e; }
      .tile[data-col="0"][data-row="0"] .tile-inner video,
      .tile[data-col="1"][data-row="0"] .tile-inner video,
      .tile[data-col="0"][data-row="2"] .tile-inner video,
      .tile[data-col="2"][data-row="2"] .tile-inner video { transform: scale(1.2); }
      .tile[data-col="1"][data-row="1"] .tile-inner video { transform: scale(1.35); }
    }

  </style>
</head>
<body>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // Match the CSS breakpoints exactly — width-only for mobile, width+pointer for tablet
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  const isTablet = window.matchMedia('(min-width: 769px) and (max-width: 1200px) and (pointer: coarse)').matches;

  const wrap           = document.getElementById('portrait-wrap');
  const tileGrid       = document.getElementById('tile-grid');
  const tiles          = Array.from(document.querySelectorAll('.tile'));
  const portraitVideoEl = document.getElementById('portrait-video');

  // Capture the current portrait video frame → set as tile backgrounds + overlay
  function capturePortraitFrame() {
    if (!portraitVideoEl || portraitVideoEl.readyState < 2) return;
    try {
      // On tablet the wrap has transform:scale(0.7) — getBoundingClientRect gives the actual
      // visual dimensions so the object-fit:cover crop matches exactly what the video shows.
      let cw, ch;
      if (isTablet) {
        const r = portraitVideoEl.getBoundingClientRect();
        cw = r.width  || 400;
        ch = r.height || 300;
      } else {
        cw = portraitVideoEl.offsetWidth  || 400;
        ch = portraitVideoEl.offsetHeight || 300;
      }
      const vw = portraitVideoEl.videoWidth   || cw;
      const vh = portraitVideoEl.videoHeight  || ch;
      // Replicate object-fit:cover so the canvas matches exactly what the video shows
      const scale = Math.max(cw / vw, ch / vh);
      const sw = vw * scale, sh = vh * scale;
      const ox = (cw - sw) / 2, oy = (ch - sh) / 2;
      const canvas = document.createElement('canvas');
      canvas.width  = cw;
      canvas.height = ch;
      canvas.getContext('2d').drawImage(portraitVideoEl, ox, oy, sw, sh);
      const url = canvas.toDataURL('image/jpeg', 0.85);
      tiles.forEach(t => t.style.backgroundImage = `url('${url}')`);
      tileGrid.style.setProperty('--portrait-src', `url('${url}')`);
    } catch (e) {}
  }

  // Capture first frame as soon as it's available (fallback before any interaction)
  portraitVideoEl.addEventListener('loadeddata', () => capturePortraitFrame(), { once: true });

  // iOS Safari won't paint the first frame without an explicit load + seek
  portraitVideoEl.load();
  portraitVideoEl.addEventListener('loadedmetadata', () => {
    portraitVideoEl.currentTime = 0.001;
  }, { once: true });

  // Video tile references
  const videoTile  = tiles[0]; // col=0, row=0 — Vi-1.mp4
  const videoInner = videoTile.querySelector('.tile-inner');
  const video      = videoInner.querySelector('video');
  const videoTile2  = tiles[1]; // col=1, row=0 — The Object.mp4
  const videoInner2 = videoTile2.querySelector('.tile-inner');
  const video2      = videoInner2.querySelector('video');
  const videoTile3  = tiles[2]; // col=2, row=0 — Far away from time.mp4
  const videoInner3 = videoTile3.querySelector('.tile-inner');
  const video3      = videoInner3.querySelector('video');
  const videoTile4  = tiles[3]; // col=0, row=1 — Payhawk Ai.mp4
  const videoInner4 = videoTile4.querySelector('.tile-inner');
  const video4      = videoInner4.querySelector('video');
  const videoTile5  = tiles[4]; // col=1, row=1 — A small step.mp4
  const videoInner5 = videoTile5.querySelector('.tile-inner');
  const video5      = videoInner5.querySelector('video');
  const videoTile6  = tiles[5]; // col=2, row=1 — Payhawk ad.mp4
  const videoInner6 = videoTile6.querySelector('.tile-inner');
  const video6      = videoInner6.querySelector('video');
  const videoTile7  = tiles[6]; // col=0, row=2 — Snow.mp4
  const videoInner7 = videoTile7.querySelector('.tile-inner');
  const video7      = videoInner7.querySelector('video');
  const videoTile8  = tiles[7]; // col=1, row=2 — Submarine.mp4
  const videoInner8 = videoTile8.querySelector('.tile-inner');
  const video8      = videoInner8.querySelector('video');
  const videoTile9  = tiles[8]; // col=2, row=2 — Alien.mp4
  const videoInner9 = videoTile9.querySelector('.tile-inner');
  const video9      = videoInner9.querySelector('video');
  let hoverController = null;

  // Init name and subtitle position
  const nameEl         = document.getElementById('name');
  const subtitleEl     = document.getElementById('subtitle');
  const subtitleAboutEl = document.getElementById('subtitle-about');
  const nameInnerEl    = document.getElementById('name-inner');
  nameEl.style.opacity = '0';
  nameEl.style.transform = 'translateX(-50%) translateY(80px)';
  subtitleEl.style.opacity = '0';
  subtitleEl.style.transform = 'translateX(-50%) translateY(80px)';
  // "About me" starts invisible, offset to the right
  subtitleAboutEl.style.opacity   = '0';
  subtitleAboutEl.style.transform = 'translateX(calc(-50% + 50px)) translateY(80px)';

  // Row labels — fly in from the left when any tile in their row is hovered

  function closeProject() {
    const overlay = document.getElementById('project-overlay');
    const tile    = activeProjectTile;

    if (!overlay || !tile) return;

      scrollEl.style.opacity       = '0';
      scrollEl.style.transform     = 'translateY(48px)';
      setTimeout(() => scrollEl.remove(), 380);
    }

    // Clean up document wheel forwarder
    if (overlay._docWheelHandler) {
      document.removeEventListener('wheel', overlay._docWheelHandler);
      delete overlay._docWheelHandler;
    }

    // If overlay was moved into the scroll container, restore it to body as position:fixed
    // so the existing FLIP animation code works unchanged.
    if (overlay.parentElement !== document.body) {
      const r = overlay.getBoundingClientRect(); // visual position before reparenting
      if (scrollEl) scrollEl.scrollTop = 0;     // snap scroll to top first
      document.body.appendChild(overlay);
      Object.assign(overlay.style, {
        position: 'fixed',
        top:      `${r.top}px`,
        left:     `${r.left}px`,
        width:    `${r.width}px`,
        height:   `${r.height}px`,
        zIndex:   '50',
      });
      overlay.getBoundingClientRect(); // force reflow
    }

    overlay.style.transition = 'none';
    overlay.style.transform  = 'translateZ(0)';
    overlay.getBoundingClientRect(); // force reflow

    const tileRect    = tile.getBoundingClientRect();
    const overlayRect = overlay.getBoundingClientRect();
    const easeOut     = 'cubic-bezier(0.22, 1, 0.36, 1)';

    const tileIdx      = tiles.indexOf(tile);
    const wasFullscreen = !!PROJECT_CONTENT[tileIdx]?.fullscreen;

    if (wasFullscreen) {
      // Animate top/left/width/height so object-fit:cover adapts gracefully — no squish
      overlay.style.transition = `top 0.8s ${easeOut}, left 0.8s ${easeOut}, width 0.8s ${easeOut}, height 0.8s ${easeOut}, border-radius 0.5s ease`;
      overlay.style.top    = `${tileRect.top}px`;
      overlay.style.left   = `${tileRect.left}px`;
      overlay.style.width  = `${tileRect.width}px`;
      overlay.style.height = `${tileRect.height}px`;
      overlay.style.borderRadius = '8px';
    } else {
      // Standard FLIP: transform scale for non-fullscreen overlays
      const dx = tileRect.left + tileRect.width  / 2 - (overlayRect.left + overlayRect.width  / 2);
      const dy = tileRect.top  + tileRect.height / 2 - (overlayRect.top  + overlayRect.height / 2);
      const sx = tileRect.width  / overlayRect.width;

      const baseW = gridW * 1.2;
      targetL = Math.round(window.innerWidth / 2 - baseW / 2);
      targetW = Math.round((window.innerWidth - targetL - 32) * 0.65);
      targetH = targetW * 9 / 16;
      targetT = titleBottomFinal + A;
    }

    // Fixed overlay lives at target position
    const overlay = document.createElement('div');
    overlay.id = 'project-overlay';
    Object.assign(overlay.style, {
      position:     'fixed',
      left:         `${targetL}px`,
      top:          `${targetT}px`,
      width:        `${targetW}px`,
      height:       `${targetH}px`,
      borderRadius: '8px', // always start at tile radius; fullscreen transitions to 0 near end
      overflow:     'hidden',
      zIndex:       '50',
      willChange:   'transform',
    });

    // Move actual <video> into overlay — playback continues uninterrupted
    if (vid) {
      Object.assign(vid.style, {
        position:       'absolute', inset: '0',
        width:          '100%', height: '100%',
        objectFit:      'cover', opacity: '1',
        objectPosition: 'center 50%',
      });
      overlay.appendChild(vid);
      vid.play();

      // Tile 1 (Far away from time): play to end then hard-cut to part 2.
      // Preload part 2 immediately so it's buffered and ready for an instant cut.
      if (tileIndex === 1) {
        vid.loop = false;
        const vid2 = document.createElement('video');
        vid2.src         = 'Far away from time 2.mp4';
        vid2.loop        = true;
        vid2.muted       = true;
        vid2.playsInline = true;
        vid2.setAttribute('playsinline', '');
        vid2.preload     = 'auto';
        Object.assign(vid2.style, {
          position:       'absolute', inset: '0',
          width:          '100%', height: '100%',
          objectFit:      'cover',
          objectPosition: 'center 30%',
          opacity:        '0',
        });
        overlay.appendChild(vid2);
        vid2.load(); // start buffering now

        vid.addEventListener('ended', () => {
          vid2.play().then(() => {
            vid2.style.opacity = '1'; // hard cut — no transition
            vid.style.opacity  = '0';
          }).catch(() => { vid2.style.opacity = '1'; vid.style.opacity = '0'; });
        }, { once: true });
      }
    }

    activeProjectTile = tile;

    // FLIP: set initial transform BEFORE adding to DOM so the overlay never
    // appears at its final position — prevents the one-frame jump on Safari iOS
    const dx = tileRect.left + tileRect.width  / 2 - (targetL + targetW / 2);
    const dy = tileRect.top  + tileRect.height / 2 - (targetT + targetH / 2);
    const sx = tileRect.width  / targetW;
    const sy = tileRect.height / targetH;
    overlay.style.transformOrigin = 'center center';
    overlay.style.transform = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;

    document.body.appendChild(overlay);

    // Push a history entry so browser back / trackpad swipe triggers closeProject
    if (pushHistory) history.pushState({ projectView: true }, '');

    overlay.style.cursor = 'pointer';
    overlay.addEventListener('click', () => history.back());

    // Other tiles scatter further and fade out
    const W = wrap.offsetWidth, H = wrap.offsetHeight;
    tiles.forEach((t, i) => {
      if (t === tile) return;
      t.style.transition = 'opacity 0.4s ease, translate 0.7s cubic-bezier(0.22,1,0.36,1)';
      t.style.opacity    = '0';
      const d = DIRS[i];
      t.style.translate  = `${d.x * W * 0.55}px ${d.y * H * 0.55}px`;
    });

    // Dismiss row labels and clear stale hover state so re-entry is clean
    rowLabels.forEach(row => {
      row.hovered.clear();
      row.el.classList.remove('visible');
    });

    // Play the FLIP animation to target.
    // For fullscreen: border-radius transitions from 8px → 0 with a delay so it only
    // starts squaring off in the final third of the animation (0.55s delay, 0.3s duration).
    requestAnimationFrame(() => {
      overlay.getBoundingClientRect(); // flush layout so Safari commits the initial transform
      requestAnimationFrame(() => {
        if (isFullscreen) {
          overlay.style.transition = 'transform 0.85s cubic-bezier(0.22, 1, 0.36, 1), border-radius 0.28s ease 0.5s';
          overlay.style.borderRadius = '0';
          // Pan video upward during FLIP; per-tile target position can be overridden
          if (vid) {
            const panTarget = tileIndex === 7 ? 'center 35%' : 'center 30%';
            vid.style.transition     = 'object-position 0.85s ease';
            vid.style.objectPosition = panTarget;
          }
        } else {
          overlay.style.transition = 'transform 0.85s cubic-bezier(0.22, 1, 0.36, 1), border-radius 0.5s ease';
        }
        overlay.style.transform = 'translate(0px, 0px) scale(1, 1)'; // explicit identity — 'none' can jump on Safari
      });
    });

    // Fullscreen: build content immediately so it animates in with the FLIP
    if (isFullscreen && projectContent) {
      requestAnimationFrame(() => {
        const scrollEl = document.createElement('div');
        scrollEl.id = 'project-scroll';
        Object.assign(scrollEl.style, {
          position: 'fixed', inset: '0', overflowY: 'auto', zIndex: '48',
          // Touch devices need pointer-events for native scrolling; desktop uses wheel forwarding
          pointerEvents: (isMobile || isTablet) ? 'auto' : 'none'
        });
        // Reserve space for the overlay (which arrives at onOverlayLanded)
        scrollEl.style.paddingTop = `${targetH}px`;

        // Mobile: fade content out as it scrolls up under the fixed video
        if (isMobile) {
          const fade = 56; // px fade zone at the video boundary
          const mask = `linear-gradient(to bottom, transparent ${targetH}px, black ${targetH + fade}px)`;
          scrollEl.style.webkitMaskImage = mask;
          scrollEl.style.maskImage = mask;
        }

        // Title block — scrolls with content, sits directly below the video
        const titleBlockEl = document.createElement('div');
        titleBlockEl.id = 'project-title-block';
        const titleNameEl = document.createElement('div');
        titleNameEl.id = 'project-page-title';
        titleNameEl.textContent = projectTitle;
        titleBlockEl.appendChild(titleNameEl);
        const titleCatEl = document.createElement('div');
        titleCatEl.id = 'project-page-subtitle';
        titleCatEl.textContent = projectContent?.category || PROJECT_CATEGORIES[Math.floor(tileIndex / 3)];
        titleBlockEl.appendChild(titleCatEl);
        scrollEl.appendChild(titleBlockEl);

        const contentEl = document.createElement('div');
        contentEl.id = 'project-content';
        Object.assign(contentEl.style, { width: '100%', pointerEvents: 'auto' });
        const footerIcons = `
          <a href="mailto:tsvyatkov.deyan@gmail.com" title="Email">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
          </a>
          <a href="https://instagram.com/here.is.dino" target="_blank" rel="noopener noreferrer" title="Instagram">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
          </a>`;
        contentEl.innerHTML = buildProjectHTML(projectContent) +
          `<div class="project-footer">${footerIcons}</div>`;
        scrollEl.appendChild(contentEl);
        document.body.appendChild(scrollEl);

        // Measure and animate title block + content in
        requestAnimationFrame(() => {
          const ease = 'cubic-bezier(0.22, 1, 0.36, 1)';

          // Title block flies in from bottom on mobile, slides up subtly on desktop
          titleBlockEl.style.opacity    = '0';
          titleBlockEl.style.transform  = isMobile ? 'translateY(64px)' : 'translateY(16px)';
          titleBlockEl.style.transition = 'none';
          requestAnimationFrame(() => {
            titleBlockEl.style.transition = `opacity 0.5s ease, transform 0.6s ${ease}`;
            titleBlockEl.style.opacity   = '1';
            titleBlockEl.style.transform = 'none';
          });

          if (isMobile) {
            // Mobile: fly in from bottom with slight stagger after title
            contentEl.style.opacity    = '0';
            contentEl.style.transform  = 'translateY(80px)';
            contentEl.style.transition = 'none';
            requestAnimationFrame(() => {
              contentEl.style.transition = `opacity 0.5s ease 0.08s, transform 0.6s ${ease} 0.08s`;
              contentEl.style.opacity   = '1';
              contentEl.style.transform = 'none';
            });
          } else {
            // Desktop: two-column fly-in (left from left, right from right)
            const leftCol     = contentEl.querySelector('.project-below-left');
            const rightCol    = contentEl.querySelector('.project-below-right');
            const creditLines = leftCol ? leftCol.querySelectorAll('p') : [];

            creditLines.forEach(p => { p.style.opacity = '0'; p.style.transform = 'translateX(-48px)'; p.style.transition = 'none'; });
            if (rightCol) { rightCol.style.opacity = '0'; rightCol.style.transform = 'translateX(48px)'; rightCol.style.transition = 'none'; }

            requestAnimationFrame(() => {
              creditLines.forEach(p => { p.style.transition = `opacity 0.5s ease, transform 0.65s ${ease}`; p.style.opacity = '1'; p.style.transform = 'none'; });
              if (rightCol) { rightCol.style.transition = `opacity 0.5s ease, transform 0.65s ${ease}`; rightCol.style.opacity = '1'; rightCol.style.transform = 'none'; }
            });
          }
        });
      });
    }

    // On FLIP complete: wire up scroll/wheel and equalise margins
    if (projectContent) {
      function onOverlayLanded(e) {
        if (e.propertyName !== 'transform') return;
        overlay.removeEventListener('transitionend', onOverlayLanded);
        overlay.style.transition = 'none';
        overlay.style.transform  = 'translateZ(0)'; // stay on GPU layer to avoid repaint artifact

        // Non-fullscreen: create content now
        if (!isFullscreen) {
          const r = overlay.getBoundingClientRect();
          const scrollEl = document.createElement('div');
          scrollEl.id = 'project-scroll';
          Object.assign(scrollEl.style, { position: 'fixed', inset: '0', overflowY: 'auto', zIndex: '48', pointerEvents: 'none' });
          const spacerEl = document.createElement('div');
          spacerEl.style.height = `${r.bottom + 48}px`;
          const contentEl = document.createElement('div');
          contentEl.id = 'project-content';
          Object.assign(contentEl.style, { marginLeft: `${r.left}px`, width: `${r.width}px`, paddingBottom: '96px', opacity: '0', transition: 'opacity 0.2s ease', pointerEvents: 'auto' });
          contentEl.innerHTML = projectContent.description || '';
          scrollEl.appendChild(spacerEl);
          scrollEl.appendChild(contentEl);
          document.body.appendChild(scrollEl);
          requestAnimationFrame(() => requestAnimationFrame(() => { contentEl.style.opacity = '1'; }));
        }

        // Desktop + tablet: move overlay into scroll container so video scrolls with content.
        // Mobile only: overlay stays position:fixed (paddingTop on scrollEl acts as spacer).
        const scrollEl = document.getElementById('project-scroll');
        if (isFullscreen && scrollEl && !isMobile) {
          scrollEl.style.paddingTop = ''; // overlay takes that space now
          Object.assign(overlay.style, {
            position:      'relative',
            top:           '', left:    '',
            width:         '100%',
            height:        `${targetH}px`,
            zIndex:        '',
            willChange:    '',
            pointerEvents: 'auto',
            cursor:        'pointer',
          });
          scrollEl.insertBefore(overlay, scrollEl.firstChild);
        }

        // Forward vertical wheel events to the scroll container.
        // Horizontal events (trackpad back/forward swipe) are left alone so the
        // browser can still handle navigation gestures.
        function docWheelForward(e) {
          if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return; // horizontal — let browser handle
          const sc = document.getElementById('project-scroll');
          if (sc) sc.scrollTop += e.deltaY;
          e.preventDefault();
        }
        document.addEventListener('wheel', docWheelForward, { passive: false });
        overlay._docWheelHandler = docWheelForward;

        // CSS margin:auto centers the block — no JS adjustment needed
      }
      overlay.addEventListener('transitionend', onOverlayLanded);
    }
  }

  const DIRS = [
    { x: -1, y: -1 }, { x:  0, y: -1 }, { x:  1, y: -1 },
    { x: -1, y:  0 }, { x:  0, y:  0 }, { x:  1, y:  0 },
    { x: -1, y:  1 }, { x:  0, y:  1 }, { x:  1, y:  1 },
  ];

  const RATIO_START = 1.501;
  const RATIO_END   = 1.7778;
  // Vertical offset so top margin (above name) equals bottom margin (below bottom tiles).
  // Derivation: total_shift = nameBottom_gap + name_height ≈ 72 + ~28px = 100px;
  // GRID_Y_OFFSET = total_shift − bottomShift = 100 − 0.025·innerHeight
  const GRID_Y_OFFSET = Math.max(50, 100 - 0.02857 * window.innerHeight);
  let progress = 0;
  let rafId = null;
  let growTimers = [];
  window.__scatterProgress = 0;

  function applyScatter(p) {
    window.__scatterProgress = p;
    const H = wrap.offsetHeight;
    // Mobile: stage is centred at ~17.6 vw from left; ratioEnd 2.3 gives W≈95 vw
    // so cols 1+2 are roughly centred and col 3 is ~50% off-screen right.
    const ratioEnd = isMobile ? 2.3 : RATIO_END;
    // Desktop: wrap fixed at RATIO_END so video frame matches the grid.
    // Mobile/tablet: keep the RATIO_START→END growth animation.
    const ratio = (!isMobile && !isTablet) ? RATIO_END : RATIO_START + (ratioEnd - RATIO_START) * p;
    const W = H * ratio;
    wrap.style.width = `${W}px`;

    const dist = window.__scatterEnergy || 0.15;

    // Tiles scatter outward; grid drifts down slightly for vertical balance.
    // On mobile the col-2 tiles are hidden — use symmetric DIRS so the 2-column
    // grid stays centred (tiles 1/4/7 scatter right instead of staying in place).
    const MOBILE_DIRS = [
      { x: -1, y: -1 }, { x:  1, y: -1 }, { x:  0, y: -1 },
      { x: -1, y:  0 }, { x:  1, y:  0 }, { x:  0, y:  0 },
      { x: -1, y:  1 }, { x:  1, y:  1 }, { x:  0, y:  1 },
    ];
    // On mobile equalise col-gap and row-gap: distX = dist·H/(2·W)
    const distX = isMobile ? dist * H / (2 * W) : dist;
    const bottomShift = H * dist * 0.4 * p;
    tiles.forEach((tile, i) => {
      tile.style.translate = `${DIRS[i].x * W * distX * p}px ${DIRS[i].y * H * dist * p}px`;
    });
    // Tablet: combine scale + translateY in one assignment so neither overwrites the other
    const translateY = `translateY(${bottomShift + GRID_Y_OFFSET * p}px)`;
    wrap.style.transform = isTablet
      ? `${translateY} scale(${0.7 + 0.3 * p})`
      : translateY;

    // Portrait video cover fades out fast so captured tile slices take over
    if (portraitVideoEl && !portraitVideoEl.classList.contains('done')) {
      portraitVideoEl.style.opacity = String(Math.max(0, 1 - p * 10));
      if (p >= 0.1) portraitVideoEl.classList.add('done');
    }
    // Desktop/tablet: skip the seamless overlay so the per-tile crossfade is visible immediately.
    // Mobile: fade the overlay out gradually so slices appear as gaps open.
    tileGrid.style.setProperty('--assembled-opacity', String(isMobile ? Math.max(0, 1 - p * 2) : 0));
    // Trigger CSS crossfade once at p=0.7 — duration set by transition, independent of easing
    if (!crossfadeTriggered) {
      crossfadeTriggered = true;
      [video,video2,video3,video4,video5,video6,video7,video8,video9].forEach(v => {
        v.style.transition = 'opacity 0.6s ease';
        v.style.opacity    = '1';
      });
    }

    // Gap between tiles grows with scatter progress
    tileGrid.style.gap = `${Math.round(p * (isMobile ? 3 : isTablet ? 5 : 10))}px`;

    // Keep row labels glued to their anchor tiles while visible
    rowLabels.forEach(row => {
      if (row.el.classList.contains('visible')) positionRowLabel(row);
    });

    // Name rises from below into place above grid, left-aligned.
    // Bottom offset grows to clear the top tiles as they move up.
    const topTileUp = H * dist * p;
    const nameBottom = 68 + topTileUp + 4;
    const nameY = 80 * (1 - p);
    nameEl.style.bottom = `calc(100% + ${nameBottom}px)`;
    nameEl.style.opacity = p;
    nameEl.style.transform = `translateX(-50%) translateY(${nameY}px)`;

    // Subtitle rises in sync with name, positioned below
    const subtitleBottom = nameBottom - 38;
    subtitleEl.style.bottom = `calc(100% + ${subtitleBottom}px)`;
    subtitleEl.style.opacity = p;
    subtitleEl.style.transform = `translateX(-50%) translateY(${nameY}px)`;

    // "About me" tracks the same vertical position but stays hidden (hover-controlled)
    subtitleAboutEl.style.bottom = `calc(100% + ${subtitleBottom}px)`;

    // Footer rises in sync with the name — flies from viewport centre to bottom
    const footerEl = document.getElementById('site-footer');
    if (footerEl) {
      const footerY = window.innerHeight * 0.4 * (1 - p);
      footerEl.style.opacity       = String(p);
      footerEl.style.transform     = `translateX(-50%) translateY(-${footerY}px)`;
      footerEl.style.pointerEvents = p >= 1 ? 'auto' : 'none';
    }
  }

  function scatter() {
    if (hasScattered) return;
    hasScattered = true;

    // Set up all interactions immediately — no need to wait for scatter to complete.
    // RAF drives tile.style.translate; hover drives tile.style.scale — they compose independently.
    hoverController = new AbortController();
    const { signal } = hoverController;
    const BORDER_T  = 'border-radius 0.7s cubic-bezier(0.22,1,0.36,1), filter 1s ease';
    const GROW_POP  = `${BORDER_T}, scale 0.4s cubic-bezier(0.22,1,0.36,1)`;
    const GROW_SLOW = `${BORDER_T}, scale 10s linear`;
    const GROW_OUT  = `${BORDER_T}, scale 0.8s ease-out`;

    // Per-tile grow controls — stored so mobile can call them from touch handlers
    const tileControls = new Map();

    tiles.forEach(t => {
      let growTimer = null;
      const startGrow = () => {
        clearTimeout(growTimer);
        t.style.zIndex = '10'; // float above sibling tiles when zooming
        t.style.transition = GROW_POP;
        t.style.scale = '1.25';
        growTimer = setTimeout(() => {
          // Desktop: only drift if still hovering; touch: always drift after first tap
          if ((isMobile || isTablet) || t.matches(':hover')) {
            t.style.transition = isMobile
              ? `${BORDER_T}, scale 6.5s linear`
              : GROW_SLOW;
            t.style.scale = '1.6';
          }
        }, 400);
        growTimers.push(growTimer);
      };
      const stopGrow = () => {
        clearTimeout(growTimer);
        t.style.zIndex = '';
        t.style.transition = GROW_OUT;
        t.style.scale = '1';
      };
      tileControls.set(t, { startGrow, stopGrow });

      if (!isMobile && !isTablet) {
        t.addEventListener('mouseenter', startGrow, { signal });
        t.addEventListener('mouseleave', stopGrow,  { signal });
        if (t.matches(':hover')) startGrow();
      }
    });

    // Fade all tiles except the active one to B&W; restore all when playback stops
    const fadeOthers = active => tiles.forEach(t => {
      t.style.filter = t === active ? '' : 'grayscale(1)';
    });
    const restoreAll = () => tiles.forEach(t => { t.style.filter = ''; });

    // Video tiles: play/pause + fade others to B&W
    const videoTiles = [
      { tile: videoTile,  vid: video  },
      { tile: videoTile2, vid: video2 },
      { tile: videoTile3, vid: video3 },
      { tile: videoTile4, vid: video4 },
      { tile: videoTile5, vid: video5 },
      { tile: videoTile6, vid: video6 },
      { tile: videoTile7, vid: video7 },
      { tile: videoTile8, vid: video8 },
      { tile: videoTile9, vid: video9 },
    ];

    if (!isMobile && !isTablet) {
      videoTiles.forEach(({ tile, vid }) => {
        const inner  = tile.querySelector('.tile-inner');
        const poster = vid.getAttribute('poster');
        const enter = () => {
          if (inner && poster) {
            inner.style.backgroundImage    = `url('${poster}')`;
            inner.style.backgroundSize     = 'cover';
            inner.style.backgroundPosition = 'center';
          }
          vid.play();
          fadeOthers(tile);
        };
        const leave = () => {
          vid.pause();
          // Only drop the poster once the video has a decoded frame (readyState ≥ 2).
          // If it hasn't buffered yet, keep the poster so the portrait slice can't show through.
          if (inner && vid.readyState >= 2) inner.style.backgroundImage = '';
          restoreAll();
        };
        tile.addEventListener('mouseenter', enter, { signal });
        tile.addEventListener('mouseleave', leave, { signal });
        if (tile.matches(':hover')) enter();
      });
    } else {
      // Touch devices (mobile + tablet): first tap → zoom + video; second tap → project page
      let mobileTapTile = null;

      videoTiles.forEach(({ tile, vid }) => {
        const inner  = tile.querySelector('.tile-inner');
        const poster = vid.getAttribute('poster');
        const { startGrow, stopGrow } = tileControls.get(tile);

        tile.addEventListener('touchend', (e) => {
          if (!scatterComplete) return;
          e.preventDefault(); // prevent ghost click

          const mobileRowLabelEl = document.getElementById('mobile-row-label');

          if (mobileTapTile !== tile) {
            const prevRowIdx = mobileTapTile ? Math.floor(tiles.indexOf(mobileTapTile) / 3) : -1;

            // Deactivate previously active tile
            if (mobileTapTile) {
              const { stopGrow: prevStop } = tileControls.get(mobileTapTile);
              prevStop();
              const prevEntry = videoTiles.find(v => v.tile === mobileTapTile);
              if (prevEntry) {
                prevEntry.vid.pause();
                const prevInner = mobileTapTile.querySelector('.tile-inner');
                if (prevInner) prevInner.style.backgroundImage = '';
              }
              restoreAll();
            }
            // Activate this tile
            mobileTapTile = tile;
            startGrow();

            // Show row label just above the grid
            if (mobileRowLabelEl) {
              const rowIdx = Math.floor(tiles.indexOf(tile) / 3);
              if (rowIdx !== prevRowIdx) {
                // New row — update text and animate in
                // Tablet: position above the tile at its max zoom (scale 1.6) so the
                // label is never overlapped. Mobile: stay relative to the wrap top.
                let labelTop;
                if (isTablet) {
                  // Always anchor to row-0 so all labels appear at the same height
                  const refRect  = tiles[0].getBoundingClientRect();
                  const centerY  = refRect.top + refRect.height / 2;
                  labelTop = Math.round(centerY - refRect.height * 0.8) - 40;
                } else {
                  labelTop = wrap.getBoundingClientRect().top - 72;
                }
                mobileRowLabelEl.style.top = `${labelTop}px`;
                const mrlTextEl = mobileRowLabelEl.querySelector('.mrl-text');
                if (mrlTextEl) mrlTextEl.textContent = rowLabels[rowIdx]?.el.textContent || '';
                if (mobileRowLabelEl._hideTimer) { clearTimeout(mobileRowLabelEl._hideTimer); mobileRowLabelEl._hideTimer = null; }
                mobileRowLabelEl.classList.remove('visible', 'hiding');
                void mobileRowLabelEl.offsetWidth;
                mobileRowLabelEl.classList.add('visible');
              }
              // Same row — leave label untouched
            }
            if (inner && poster) {
              inner.style.backgroundImage    = `url('${poster}')`;
              inner.style.backgroundSize     = 'cover';
              inner.style.backgroundPosition = 'center';
            }
            vid.play().catch(() => {});
            fadeOthers(tile);
          } else {
            // Second tap on same tile → open project page
            openProject(tile);
          }
        }, { signal, passive: false });
      });

      // Tap outside any tile → reset active tile back to normal
      document.addEventListener('touchend', (e) => {
        if (!mobileTapTile) return;
        if (e.target.closest('.tile')) return; // tap was on a tile — handled above
        const { stopGrow } = tileControls.get(mobileTapTile);
        stopGrow();
        const prevEntry = videoTiles.find(v => v.tile === mobileTapTile);
        if (prevEntry) {
          prevEntry.vid.pause();
          const prevInner = mobileTapTile.querySelector('.tile-inner');
          if (prevInner) prevInner.style.backgroundImage = '';
        }
        restoreAll();
        mobileTapTile = null;
        hideMrl(document.getElementById('mobile-row-label'));
      }, { signal, passive: true });
    }

    // Row labels: desktop only (hidden + disabled on touch devices)
    if (isMobile || isTablet) rowLabels.forEach(row => { row.el.style.display = 'none'; });
    if (!isMobile && !isTablet) rowLabels.forEach(row => {
      let hideTimer = null;
      row.tilesInRow.forEach(tile => {
        const enter = () => {
          clearTimeout(hideTimer);
          row.hovered.add(tile);
          // Only reposition when the label first appears — not while already visible,
          // since the anchor tile's scaled rect would cause a jump between thumbnails.
          if (!row.el.classList.contains('visible')) positionRowLabel(row);
          row.el.classList.add('visible');
        };
        const leave = () => {
          row.hovered.delete(tile);
          if (row.hovered.size === 0) {
            hideTimer = setTimeout(() => row.el.classList.remove('visible'), 200);

        tile.addEventListener('mouseleave', leave, { signal });
        if (tile.matches(':hover')) enter();

    }); // end if (!isMobile) rowLabels

    // Desktop only: click → enter project view (touch devices use two-tap)
    if (!isMobile && !isTablet) {
      tiles.forEach(t => {
        t.addEventListener('click', () => openProject(t), { signal });

    }

    wrap.removeEventListener('mouseenter', onMouseEnter);
    window.removeEventListener('wheel', onWheel);
    window.removeEventListener('touchmove', onTouchMove);

        // correctly — iOS Safari does not apply object-fit:cover to video poster.
        if (isMobile || isTablet) {

        return;

      const sp = Math.min(1, Math.pow(progress, 2.4) * (3.4 - 2.4 * progress));

      t.style.translate  = '';
      t.style.scale      = '';
      t.style.filter     = '';

    video.currentTime   = 0;
    video.style.transition = '';
    video.style.opacity = '0';
    [video2,video3,video4,video5,video6,video7,video8,video9].forEach(v => {

    tileGrid.style.setProperty('--assembled-opacity', '1');

      portraitVideoEl.currentTime = 0;
    }
    portraitVideoTriggered = false;

    wrap.style.width = `${wrap.offsetHeight * ((!isMobile && !isTablet) ? RATIO_END : RATIO_START)}px`;
    window.__scatterProgress = 0;
    tileGrid.style.gap = '0px';
    nameEl.style.opacity = '0';
    nameEl.style.transform = 'translateX(-50%) translateY(80px)';
    nameEl.style.bottom = 'calc(100% + 68px)';
    if (nameInnerEl) nameInnerEl.style.transform = '';
    subtitleAboutEl.style.opacity   = '0';
    subtitleAboutEl.style.transform = 'translateX(calc(-50% + 50px)) translateY(80px)';
    const footerEl = document.getElementById('site-footer');
    if (footerEl) {
      footerEl.style.opacity       = '0';
      footerEl.style.transform     = `translateX(-50%) translateY(-${window.innerHeight * 0.4}px)`;
      footerEl.style.pointerEvents = 'none';
    }
    wrap.addEventListener('mouseenter', onMouseEnter);
    window.addEventListener('wheel', onWheel, { passive: true });
    window.addEventListener('touchmove', onTouchMove, { passive: true });
  };

  let portraitVideoTriggered = false;

  function playPortraitVideo() {
    if (portraitVideoTriggered || hasScattered) return;
    portraitVideoTriggered = true;
    clearTimeout(autoScatterTimer);
    portraitVideoEl.play().catch(() => scatter());
  }

  function onMouseEnter() { playPortraitVideo(); }
  function onWheel(e) { if (e.deltaY > 10) { capturePortraitFrame(); scatter(); } }
  let touchY0 = null;
  let touchX0 = null;
  function onTouchMove(e) {
    if (touchY0 === null) return;
    const dy = Math.abs(e.touches[0].clientY - touchY0);
    const dx = Math.abs(e.touches[0].clientX - touchX0);
    if (dy > 30 || dx > 30) playPortraitVideo();
  }

  // Pre-capture 2s before end (warms up GPU/canvas), then re-capture at scatter time
  // so the canvas always matches the exact frame the video is showing when it fades out.
  let framePrecaptured = false;
  portraitVideoEl.addEventListener('timeupdate', () => {
    if (!portraitVideoEl.duration || hasScattered) return;
    const remaining = portraitVideoEl.duration - portraitVideoEl.currentTime;
    if (!framePrecaptured && remaining <= 2.1) {
      framePrecaptured = true;
      capturePortraitFrame(); // warm-up
    }
    if (remaining <= 1.1) {
      capturePortraitFrame(); // sync canvas to the frame actually visible right now
      scatter();
    }
  });

  window.addEventListener('touchstart', e => {
    touchY0 = e.touches[0].clientY;
    touchX0 = e.touches[0].clientX;
  }, { passive: true });

  var autoScatterTimer = null; // no auto-scatter

  if (isMobile || isTablet) {
    // Touch devices: tap portrait → play video; swipe anywhere → immediate scatter
    wrap.addEventListener('touchend', (e) => {
      e.preventDefault();
      playPortraitVideo();
    }, { once: true, passive: false });
    window.addEventListener('touchmove', onTouchMove, { passive: true });
  } else {
    wrap.addEventListener('mouseenter', onMouseEnter);
    window.addEventListener('wheel', onWheel, { passive: true });
    window.addEventListener('touchmove', onTouchMove, { passive: true });
    if (wrap.matches(':hover')) playPortraitVideo();
  }

  // Browser back/forward buttons and trackpad swipes
  window.addEventListener('popstate', (e) => {
    if (isProjectView) {
      // Going back: close project view
      closeProject();
    } else if (e.state?.projectView && lastProjectTile && hasScattered) {
      // Going forward: re-open the last project (state already restored, skip pushState)
      openProject(lastProjectTile, false);
    }
  });
});
</script>

(function mountTweaks() {

    setTimeout(mountTweaks, 50);
    return;
  }

  const TWEAK_DEFAULTS = {
    mood: 'Haze',
    scatterEnergy: 10,
    portraitScale: 'Intimate'

  const MOODS = {
    Stark: { bg: '#e4e4e2', overlay: '#050505', nameColor: '#111',    cursor: '#111'    },
    Warm:  { bg: '#c4bfb8', overlay: '#1a1712', nameColor: '#1a1712', cursor: '#1a1712' },

  const SCALES = { Intimate: '36vh', Standard: '48vh', Monumental: '62vh' };

  function applyTweaks(t) {
    const mood  = MOODS[t.mood] || MOODS.Haze;
    const scale = SCALES[t.portraitScale] || SCALES.Intimate;
    const energy = t.scatterEnergy / 100;

    document.documentElement.style.setProperty('--bg-color', mood.bg);

    const cursorEl = document.getElementById('cursor');
    if (cursorEl) cursorEl.style.background = mood.cursor;
