<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deyan Tsvyatkov</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --overlay-color: #2a1f14;
      --bg-color: #ccc5ba;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-color);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Outer stage wraps name + grid together */
    #stage {
      position: relative;
    }

    /* Name — above grid, left-aligned to grid edge */
    #name {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(18px, 2.2vw, 36px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      word-spacing: 0.35em;
      color: #3d2f1e;
      opacity: 0;
      white-space: nowrap;
      user-select: none;
      position: absolute;
      left: 50%;
      bottom: calc(100% + 68px);
      will-change: transform, opacity;
      z-index: 30;
    }

    #name-inner {
      display: inline-block;
      will-change: transform;
      transform-origin: center center;
    }

    #subtitle, #subtitle-about {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(12px, 1vw, 16px);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #3d2f1e;
      opacity: 0;
      white-space: nowrap;
      user-select: none;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(100% + 30px);
      will-change: transform, opacity;
      z-index: 30;
    }

    /* Portrait */
    #portrait-wrap {
      position: relative;
      width: calc(47.61vh * 1.501);
      height: 47.61vh;
    }

    /* 3×3 tile grid */
    #tile-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 0;
      transition: filter 0.15s ease;
    }

    /* Single assembled-portrait overlay — eliminates all tile seam artifacts.
       Fades out as scatter progresses (--assembled-opacity driven by RAF). */
    #tile-grid::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: var(--portrait-src, none);
      background-size: 100% 100%;
      background-repeat: no-repeat;
      pointer-events: none;
      z-index: 2;
      opacity: var(--assembled-opacity, 1);
    }

    .tile {
      position: relative;
      overflow: hidden;
      cursor: default;
      background-size: 300% 300%;
      background-repeat: no-repeat;
      border-radius: 0px;
      transition: border-radius 0.7s cubic-bezier(0.22, 1, 0.36, 1), filter 1s ease;
      will-change: translate, scale;
    }

    .tile.scattered {
      border-radius: 8px;
      cursor: pointer;
    }

    /* 3×3 background positions — on .tile itself to avoid sub-pixel gaps */
    .tile[data-col="0"][data-row="0"] { background-position:   0%   0%; }
    .tile[data-col="1"][data-row="0"] { background-position:  50%   0%; }
    .tile[data-col="2"][data-row="0"] { background-position: 100%   0%; }
    .tile[data-col="0"][data-row="1"] { background-position:   0%  50%; }
    .tile[data-col="1"][data-row="1"] { background-position:  50%  50%; }
    .tile[data-col="2"][data-row="1"] { background-position: 100%  50%; }
    .tile[data-col="0"][data-row="2"] { background-position:   0% 100%; }
    .tile[data-col="1"][data-row="2"] { background-position:  50% 100%; }
    .tile[data-col="2"][data-row="2"] { background-position: 100% 100%; }

    /* Video container — sits on top of .tile's background, no bg of its own */
    .tile-inner {
      position: absolute;
      inset: 0;
    }

    /* Video opacity driven directly by scatter RAF — no CSS transition needed */
    .tile-inner video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
    }

    /* Dark overlay per tile */
    .tile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--overlay-color);
      opacity: 0;
      border-radius: inherit;
      transition: opacity 0.6s ease;
      pointer-events: none;
      z-index: 1;
    }

    /* overlay stays at opacity: 0 — darkening effect removed */

    /* Row label — flies in from the left when a tile in that row is hovered */
    .row-label {
      position: fixed;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(11px, 1.1vw, 15px);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      word-spacing: 0.2em;
      color: #3d2f1e;
      white-space: nowrap;
      opacity: 0;
      transform: translate(-100px, -50%);
      transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
      pointer-events: none;
      z-index: 10;
    }
    .row-label.visible {
      opacity: 1;
      transform: translate(0, -50%);
    }

    /* Project page title — appears in place of "Deyan Tsvyatkov" when a project opens */
    #project-page-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(18px, 2.2vw, 36px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      word-spacing: 0.35em;
      color: #3d2f1e;
      white-space: nowrap;
      user-select: none;
      position: fixed;
      left: 50%;
      will-change: top, transform, opacity;
      z-index: 60;
      pointer-events: none;
    }

    #project-content {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(15px, 1.3vw, 19px);
      line-height: 1.75;
      color: #3d2f1e;
    }
    #project-content p { margin-bottom: 1.1em; }
    #project-content p:last-child { margin-bottom: 0; }
    #project-content a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: rgba(61,47,30,0.4);
      transition: text-decoration-color 0.2s ease;
    }
    #project-content a:hover { text-decoration-color: rgba(61,47,30,1); }

    /* Credits pinned to the left of the video */
    #project-credits-left {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(11px, 0.82vw, 13px);
      line-height: 1.75;
      color: #3d2f1e;
      text-align: right;
    }
    #project-credits-left p { margin-bottom: 2px; }
    .credits-panel-title {
      font-size: clamp(26px, 3vw, 46px);
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #3d2f1e;
      line-height: 1.1;
      white-space: nowrap;
      margin-bottom: 40px !important;
      position: relative;
    }
    .credits-panel-title .title-main { text-transform: uppercase; }
    .credits-panel-title .title-sub  {
      font-size: 0.62em;
      letter-spacing: 0.08em;
      color: #8a8a8a;
      text-transform: none;
    }
    .credit-role { color: #8a8a8a; }
    .credit-name { color: #3d2f1e; }

    /* Two-column layout below fullscreen video — shifted left */
    .project-below {
      display: flex;
      gap: 42px;
      padding: 34px 0 48px;
      width: 72%;
      margin-left: 7%;
      margin-right: 21%;
      box-sizing: border-box;
    }
    .project-below-left, .project-below-right { flex: 1; }
    .project-below-left {
      text-align: right;
      font-size: clamp(10px, 0.75vw, 12px);
      line-height: 1.5;
    }
    .project-below-left p { margin-bottom: 1px; }

    /* Description centered below the video */
    .project-subheader {
      font-size: clamp(16px, 1.35vw, 21px);
      font-style: italic;
      line-height: 1.55;
      margin-bottom: 20px;
    }
    .project-body {
      font-size: clamp(14px, 1.1vw, 17px);
      line-height: 1.8;
      margin-bottom: 14px;
    }
    .project-body:last-child { margin-bottom: 0; }

    /* Footer — driven by applyScatter on the grid; scrollable on project pages */
    #site-footer {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 22px;
      align-items: center;
      opacity: 0;
      z-index: 55;
      pointer-events: none;
    }
    #site-footer a, .project-footer a {
      color: #3d2f1e;
      display: flex;
      align-items: center;
      opacity: 0.55;
      transition: opacity 0.2s ease;
      text-decoration: none;
    }
    #site-footer a:hover, .project-footer a:hover { opacity: 1; }
    .project-footer {
      display: flex;
      justify-content: center;
      gap: 22px;
      padding: 24px 0 48px;
    }

    /* ── Tablet (touch, 769–1200 px) ────────────────────────── */
    @media (pointer: coarse) and (min-width: 769px) and (max-width: 1200px) {
      #portrait-wrap {
        width:  calc(35vh * 1.501) !important;
        height: 35vh !important;
      }
      #stage { width: calc(35vh * 1.501); margin: 0 auto; }
      .row-label { display: none; }
    }

    /* ── Mobile ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Portrait fills the screen width with correct aspect ratio */
      #portrait-wrap {
        width:  calc(48vw * 1.501) !important;
        height: 48vw !important;
      }
      /* Explicit stage width + margin:auto for reliable centering */
      #stage { width: calc(48vw * 1.501); margin: 0 auto; }

      /* 2-column grid — hide the rightmost column, tighter gap */
      #tile-grid { grid-template-columns: 1fr 1fr; gap: 1px !important; }
      .tile[data-col="2"] { display: none; }

      /* Row labels don't make sense without hover */
      .row-label { display: none; }

      /* Project page — single column: title → subtitle → description → credits */
      .project-below-mobile {
        padding: 72px 20px 32px;   /* video → title, bottom */
        font-family: 'EB Garamond', Georgia, serif;
        color: #3d2f1e;
      }
      .project-below-mobile .credits-panel-title {
        left: 0 !important;
        margin-bottom: 56px !important;  /* title → subtitle */
        font-size: clamp(22px, 7vw, 34px);
      }
      .project-below-mobile .project-subheader { font-size: clamp(16px, 4.5vw, 22px); margin-bottom: 40px; } /* subtitle → description */
      .project-below-mobile .project-body     { font-size: clamp(14px, 4vw, 18px);   margin-bottom: 12px; }
      .project-credits-mobile { margin-top: 64px; font-size: clamp(11px, 3vw, 14px); line-height: 1.6; } /* description → credits */
      .project-credits-mobile p { margin-bottom: 2px; }
      .project-credits-mobile .credit-role { color: #8a8a8a; }
      .project-credits-mobile .credit-name { color: #3d2f1e; }
    }

  </style>
</head>

    <div id="tile-grid">

<script>
document.addEventListener('DOMContentLoaded', function () {
  const IMG_SRC = 'Portrait.jpg';

  // Declare core elements first — everything below depends on these
  const isMobile = window.matchMedia('(pointer: coarse) and (max-width: 768px)').matches;
  const isTablet = window.matchMedia('(pointer: coarse) and (min-width: 769px) and (max-width: 1200px)').matches;

  const wrap     = document.getElementById('portrait-wrap');
  const tileGrid = document.getElementById('tile-grid');
  const tiles    = Array.from(document.querySelectorAll('.tile'));

  // Portrait background on each tile + assembled single-image overlay (no seams)
  tiles.forEach(tile => {
    tile.style.backgroundImage = `url('${IMG_SRC}')`;
  });
  tileGrid.style.setProperty('--portrait-src', `url('${IMG_SRC}')`);

  // Video tile references
  const videoTile  = tiles[0]; // col=0, row=0 — Vi-1.mp4
  const videoInner = videoTile.querySelector('.tile-inner');
  const video      = videoInner.querySelector('video');
  const videoTile2  = tiles[1]; // col=1, row=0 — The Object.mp4
  const videoInner2 = videoTile2.querySelector('.tile-inner');
  const video2      = videoInner2.querySelector('video');
  const videoTile3  = tiles[2]; // col=2, row=0 — Far away from time.mp4
  const videoInner3 = videoTile3.querySelector('.tile-inner');
  const video3      = videoInner3.querySelector('video');
  const videoTile4  = tiles[3]; // col=0, row=1 — Payhawk Ai.mp4
  const videoInner4 = videoTile4.querySelector('.tile-inner');
  const video4      = videoInner4.querySelector('video');
  const videoTile5  = tiles[4]; // col=1, row=1 — A small step.mp4
  const videoInner5 = videoTile5.querySelector('.tile-inner');
  const video5      = videoInner5.querySelector('video');
  const videoTile6  = tiles[5]; // col=2, row=1 — Payhawk ad.mp4
  const videoInner6 = videoTile6.querySelector('.tile-inner');
  const video6      = videoInner6.querySelector('video');
  const videoTile7  = tiles[6]; // col=0, row=2 — Snow.mp4
  const videoInner7 = videoTile7.querySelector('.tile-inner');
  const video7      = videoInner7.querySelector('video');
  const videoTile8  = tiles[7]; // col=1, row=2 — Submarine.mp4
  const videoInner8 = videoTile8.querySelector('.tile-inner');
  const video8      = videoInner8.querySelector('video');
  const videoTile9  = tiles[8]; // col=2, row=2 — Alien.mp4
  const videoInner9 = videoTile9.querySelector('.tile-inner');
  const video9      = videoInner9.querySelector('video');
  let hoverController = null;

  // Init name and subtitle position
  const nameEl         = document.getElementById('name');
  const subtitleEl     = document.getElementById('subtitle');
  const subtitleAboutEl = document.getElementById('subtitle-about');
  const nameInnerEl    = document.getElementById('name-inner');
  nameEl.style.opacity = '0';
  nameEl.style.transform = 'translateX(-50%) translateY(80px)';
  subtitleEl.style.opacity = '0';
  subtitleEl.style.transform = 'translateX(-50%) translateY(80px)';
  // "About me" starts invisible, offset to the right
  subtitleAboutEl.style.opacity   = '0';
  subtitleAboutEl.style.transform = 'translateX(calc(-50% + 50px)) translateY(80px)';

  // Row labels — fly in from the left when any tile in their row is hovered
  const ROW_LABEL_GAP = 80;
  const rowLabels = [
    { el: document.getElementById('row-label-1'), anchor: tiles[0], tilesInRow: [tiles[0], tiles[1], tiles[2]], hovered: new Set() },
    { el: document.getElementById('row-label-2'), anchor: tiles[3], tilesInRow: [tiles[3], tiles[4], tiles[5]], hovered: new Set() },
    { el: document.getElementById('row-label-3'), anchor: tiles[6], tilesInRow: [tiles[6], tiles[7], tiles[8]], hovered: new Set() },
  ];
  function positionRowLabel(row) {
    const rect = row.anchor.getBoundingClientRect();
    row.el.style.top   = `${rect.top + rect.height / 2}px`;
    row.el.style.right = `${window.innerWidth - rect.left + ROW_LABEL_GAP}px`;
  }

  // Per-project page title — reserved for future use; empty means no swap.
  const PROJECT_TITLES = {};

  // Project page content, keyed by tile index.
  // title/titleStyle drive the heading; credits are the lines below it; description is the right/top column.
  const PLACEHOLDER_CREDITS = `
<p><span class="credit-role">Written &amp; Directed by </span><span class="credit-name">Deyan Tsvyatkov</span></p>
<p><span class="credit-role">Produced by </span><span class="credit-name">Johana Trayanova &amp; Deyan Tsvyatkov</span></p>
<p><span class="credit-role">Director of Photography </span><span class="credit-name">Dimitar Tenev</span></p>
<p><span class="credit-role">Costume Design </span><span class="credit-name">Mirella Vassileva</span></p>
<p><span class="credit-role">Edited by </span><span class="credit-name">Alexandra Nenkova</span></p>
<p><span class="credit-role">Visual Effects </span><span class="credit-name">Valentin Serafimov</span></p>
<p><span class="credit-role">Sound Design </span><span class="credit-name">Rossen Pavlov</span></p>
<p><span class="credit-name">A Remove Remove / Hanplayed / Serafimov Film / b2y Production</span></p>
<p><span class="credit-role">Realised with the support of </span><span class="credit-name">the National Culture Fund Bulgaria</span></p>`;

  const PLACEHOLDER_DESC = `
<p class="project-subheader">Are we using machines, or have they started using us back?</p>
<p class="project-body">I wrote and shot this short film with funding from the NCF and my last savings during the pandemic. The project was too ambitious for its limited budget so I heavily compensated in each department, including making the music and sound design.</p>
<p class="project-body">It won an award at the Berlin Sci-Fi Festival, caused some media buzz and ended up being bought by HBO. You can watch it <a href="https://youtu.be/854_6PaC-ic?si=fM858B0EWtrqyIBU" target="_blank" rel="noopener noreferrer">here</a>.</p>`;

  // Build the project page HTML — two columns on desktop, single column on mobile
  function buildProjectHTML(c) {
    const titleP = `<p class="credits-panel-title" style="${c.titleStyle || ''}">${c.title || ''}</p>`;
    if (isMobile) {
      return `<div class="project-below-mobile">
        ${titleP}
        <div>${c.description || ''}</div>
        <div class="project-credits-mobile">${c.credits || ''}</div>
      </div>`;
    }
    return `<div class="project-below">
      <div class="project-below-left">${titleP}${c.credits || ''}</div>
      <div class="project-below-right">${c.description || ''}</div>
    </div>`;
  }

  const PROJECT_CONTENT = {
    0: {
      fullscreen: true,
      title: `<span class="title-main">Vi</span> <span class="title-sub">(short film)</span>`,
      titleStyle: 'left:27%',
      credits: `
<p><span class="credit-role">Written &amp; Directed by </span><span class="credit-name">Deyan Tsvyatkov</span></p>
<p><span class="credit-role">Produced by </span><span class="credit-name">Johana Trayanova &amp; Deyan Tsvyatkov</span></p>
<p><span class="credit-role">Director of Photography </span><span class="credit-name">Dimitar Tenev</span></p>
<p><span class="credit-role">Costume Design </span><span class="credit-name">Mirella Vassileva</span></p>
<p><span class="credit-role">Edited by </span><span class="credit-name">Alexandra Nenkova</span></p>
<p><span class="credit-role">Visual Effects </span><span class="credit-name">Valentin Serafimov</span></p>
<p><span class="credit-role">Sound Design </span><span class="credit-name">Rossen Pavlov</span></p>
<p><span class="credit-name">A Remove Remove / Hanplayed / Serafimov Film / b2y Production</span></p>
<p><span class="credit-role">Realised with the support of </span><span class="credit-name">the National Culture Fund Bulgaria</span></p>`,
      description: `
<p class="project-subheader">Are we using machines, or have they started using us back?</p>
<p class="project-body">I wrote and shot this short film with funding from the NCF and my last savings during the pandemic. The project was too ambitious for its limited budget so I heavily compensated in each department, including making the music and sound design.</p>
<p class="project-body">It won an award at the Berlin Sci-Fi Festival, caused some media buzz and ended up being bought by HBO. You can watch it <a href="https://youtu.be/854_6PaC-ic?si=fM858B0EWtrqyIBU" target="_blank" rel="noopener noreferrer">here</a>.</p>`,
    },
    1: {
      fullscreen: true,
      title: `<span class="title-main">Far Away from Time</span>`,
      titleStyle: 'left:40%',

  };

  let hasScattered      = false;
  let isProjectView     = false;
  let scatterComplete   = false;
  let activeProjectTile = null;
  let lastProjectTile   = null; // retained after close for forward navigation

  function closeProject() {
    const overlay = document.getElementById('project-overlay');
    const tile    = activeProjectTile;
    lastProjectTile = tile; // save before clearing, so forward nav can re-open it
    if (!overlay || !tile) return;

    // Fade out and remove all project page content
    const creditsEl = document.getElementById('project-credits-left');
    const contentEl = document.getElementById('project-content');
    const scrollEl  = document.getElementById('project-scroll');
    if (creditsEl) { creditsEl.style.opacity = '0'; setTimeout(() => creditsEl.remove(), 500); }
    if (contentEl) contentEl.style.opacity = '0';
    if (scrollEl)  setTimeout(() => scrollEl.remove(), 500);

    // Clean up document wheel forwarder
    if (overlay._docWheelHandler) {
      document.removeEventListener('wheel', overlay._docWheelHandler);
      delete overlay._docWheelHandler;
    }

    // If overlay was moved into the scroll container, restore it to body as position:fixed
    // so the existing FLIP animation code works unchanged.
    if (overlay.parentElement !== document.body) {
      const r = overlay.getBoundingClientRect(); // visual position before reparenting
      if (scrollEl) scrollEl.scrollTop = 0;     // snap scroll to top first
      document.body.appendChild(overlay);
      Object.assign(overlay.style, {
        position: 'fixed',
        top:      `${r.top}px`,
        left:     `${r.left}px`,
        width:    `${r.width}px`,
        height:   `${r.height}px`,
        zIndex:   '50',
      });
      overlay.getBoundingClientRect(); // force reflow
    }

    overlay.style.transition = 'none';
    overlay.style.transform  = 'translateZ(0)';
    overlay.getBoundingClientRect(); // force reflow

    const tileRect    = tile.getBoundingClientRect();
    const overlayRect = overlay.getBoundingClientRect();
    const easeOut     = 'cubic-bezier(0.22, 1, 0.36, 1)';

    const tileIdx      = tiles.indexOf(tile);
    const wasFullscreen = !!PROJECT_CONTENT[tileIdx]?.fullscreen;

    if (wasFullscreen) {
      // Animate top/left/width/height so object-fit:cover adapts gracefully — no squish
      overlay.style.transition = `top 0.8s ${easeOut}, left 0.8s ${easeOut}, width 0.8s ${easeOut}, height 0.8s ${easeOut}, border-radius 0.5s ease`;
      overlay.style.top    = `${tileRect.top}px`;
      overlay.style.left   = `${tileRect.left}px`;
      overlay.style.width  = `${tileRect.width}px`;
      overlay.style.height = `${tileRect.height}px`;
      overlay.style.borderRadius = '8px';
    } else {
      // Standard FLIP: transform scale for non-fullscreen overlays
      const dx = tileRect.left + tileRect.width  / 2 - (overlayRect.left + overlayRect.width  / 2);
      const dy = tileRect.top  + tileRect.height / 2 - (overlayRect.top  + overlayRect.height / 2);
      const sx = tileRect.width  / overlayRect.width;
      const sy = tileRect.height / overlayRect.height;
      overlay.style.transition   = `transform 0.8s ${easeOut}, border-radius 0.5s ease`;
      overlay.style.transform    = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;
      overlay.style.borderRadius = '8px';
    }

    const easing = easeOut;

    // If we swapped to a project page title, fade it out and bring the originals back
    const titleEl = document.getElementById('project-page-title');
    if (titleEl) {
      titleEl.style.transition = 'opacity 0.3s ease';
      titleEl.style.opacity    = '0';
      setTimeout(() => titleEl.remove(), 400);

      // Fade originals back in (slight delay so the new title is on its way out)
      setTimeout(() => {
        nameEl.style.transition     = 'opacity 0.4s ease';
        subtitleEl.style.transition = 'opacity 0.4s ease';
        nameEl.style.opacity     = '1';
        subtitleEl.style.opacity = '1';
      }, 200);
    } else {
      // Fly name + subtitle back in from the top
      nameEl.style.transition     = `transform 0.7s ${easing}, opacity 0.5s ease`;
      subtitleEl.style.transition = `transform 0.7s ${easing}, opacity 0.5s ease`;
      nameEl.style.transform      = 'translateX(-50%) translateY(0)';
      subtitleEl.style.transform  = 'translateX(-50%) translateY(0)';
      nameEl.style.opacity        = '1';
      subtitleEl.style.opacity    = '1';
    }

    // Fly footer in from below — symmetric to the title flying in from the top
    const gridFooter = document.getElementById('site-footer');
    if (gridFooter) {
      gridFooter.style.transition = 'none';
      gridFooter.style.transform  = 'translateX(-50%) translateY(60px)';
      gridFooter.style.opacity    = '0';
      requestAnimationFrame(() => {
        gridFooter.style.transition    = `transform 0.7s ${easing}, opacity 0.5s ease`;
        gridFooter.style.transform     = 'translateX(-50%) translateY(0)';
        gridFooter.style.opacity       = '1';
        gridFooter.style.pointerEvents = 'auto';
      });
    }

    // Bring other tiles home to their scatter positions
    const W    = wrap.offsetWidth, H = wrap.offsetHeight;
    const dist = window.__scatterEnergy || 0.15;
    tiles.forEach((t, i) => {
      if (t === tile) return;
      t.style.transition = 'opacity 0.5s ease, translate 0.8s cubic-bezier(0.22, 1, 0.36, 1)';
      t.style.opacity    = '1';
      t.style.translate  = `${DIRS[i].x * W * dist}px ${DIRS[i].y * H * dist}px`;
    });

    // On animation complete: move video back, remove overlay, re-enable grid
    const watchProp = wasFullscreen ? 'width' : 'transform';
    function onEnd(e) {
      if (e.propertyName !== watchProp) return;
      overlay.removeEventListener('transitionend', onEnd);

      const vid = overlay.querySelector('video');
      if (vid) {
        vid.pause();

        vid.currentTime = 0;     // rewind so tile starts fresh
        Object.assign(vid.style, {
          position:       'absolute', inset: '0',
          width:          '100%', height: '100%',
          objectFit:      'cover', opacity: '1',
          objectPosition: '',

        tile.querySelector('.tile-inner').appendChild(vid);

      // Restore color on all tiles over 0.4s
      tiles.forEach(t => { t.style.transition = 'filter 0.4s ease'; t.style.filter = ''; });
      tile.style.opacity = '1';
      overlay.remove();

      // Clear project-view transitions so applyScatter can drive these freely again
      nameEl.style.transition     = '';
      subtitleEl.style.transition = '';
      const gridFooter = document.getElementById('site-footer');
      if (gridFooter) gridFooter.style.transition = '';

      isProjectView      = false;
      activeProjectTile  = null;

      hasScattered    = false;
      scatterComplete = false;
      scatter();
    }
    overlay.addEventListener('transitionend', onEnd);
  }

  function openProject(tile, pushHistory = true) {
    if (isProjectView) return;
    isProjectView = true;

    // Freeze scatter RAF
    cancelAnimationFrame(rafId);
    rafId = null;

    // Release all hover/scale listeners
    if (hoverController) { hoverController.abort(); hoverController = null; }
    growTimers.forEach(id => clearTimeout(id));
    growTimers = [];

    // Capture visual rect first — includes any active scale transform
    const tileRect = tile.getBoundingClientRect();
    const vid      = tile.querySelector('video');

    // Snap tile scales back to 1 so the FLIP math is clean
    tiles.forEach(t => { t.style.transition = ''; t.style.scale = '1'; });

    // Hide the fixed grid footer — project pages have their own scrollable footer
    const gridFooter = document.getElementById('site-footer');
    if (gridFooter) { gridFooter.style.opacity = '0'; gridFooter.style.pointerEvents = 'none'; }

    // Read current rects before any animation
    const nameRect     = nameEl.getBoundingClientRect();
    const subtitleRect = (subtitleEl.offsetWidth > 0 ? subtitleEl : nameEl).getBoundingClientRect();

    // A = desired top margin (= gap below title to thumbnail).
    // Halve the scatter-state top margin so both spaces are 50% smaller.
    const SHIFT_UP = Math.round(window.innerHeight * 0.03);
    const A        = (nameRect.top - SHIFT_UP) / 2;
    const shift    = nameRect.top - A;
    const easing   = 'cubic-bezier(0.22, 1, 0.36, 1)';

    const tileIndex    = tiles.indexOf(tile);
    const projectTitle = PROJECT_TITLES[tileIndex];

    let titleBottomFinal; // y position of the bottom of the active title (used for targetT)

    if (projectTitle) {
      // Fade out original "Deyan Tsvyatkov" + "Writer & director"
      nameEl.style.transition     = 'opacity 0.3s ease';
      subtitleEl.style.transition = 'opacity 0.3s ease';
      nameEl.style.opacity     = '0';
      subtitleEl.style.opacity = '0';

      // Remove any leftover title from a previous quick close
      const stale = document.getElementById('project-page-title');
      if (stale) stale.remove();

      // Create the new project title — initially at viewport center, hidden
      const titleEl = document.createElement('div');
      titleEl.id = 'project-page-title';
      titleEl.textContent = projectTitle;
      Object.assign(titleEl.style, {
        top:       `${Math.round(window.innerHeight / 2)}px`,
        transform: 'translate(-50%, -50%) scale(0.94)',
        opacity:   '0',
      });
      document.body.appendChild(titleEl);
      const titleHeight = titleEl.offsetHeight;
      titleBottomFinal  = A + titleHeight;

      // Fade in from centre and arrive at final position exactly when the FLIP lands (0.85s)
      requestAnimationFrame(() => requestAnimationFrame(() => {
        titleEl.style.transition = `top 0.85s ${easing}, transform 0.85s ${easing}, opacity 0.6s ease`;
        titleEl.style.top        = `${A}px`;
        titleEl.style.transform  = 'translate(-50%, 0) scale(1)';
        titleEl.style.opacity    = '1';
      }));
    } else {
      // Fly name + subtitle off the top of the screen
      const flyOut = nameRect.top + 60;
      nameEl.style.transition     = `transform 0.6s ${easing}, opacity 0.4s ease`;
      subtitleEl.style.transition = `transform 0.6s ${easing}, opacity 0.4s ease`;
      nameEl.style.transform      = `translateX(-50%) translateY(-${flyOut}px)`;
      subtitleEl.style.transform  = `translateX(-50%) translateY(-${flyOut}px)`;
      nameEl.style.opacity        = '0';
      subtitleEl.style.opacity    = '0';
      // Thumbnail sits with a small fixed top margin since the title is gone
      titleBottomFinal = Math.round(window.innerHeight * 0.04);
    }

    // Size and position the overlay — fullscreen projects fill the entire viewport.
    const projectContent  = PROJECT_CONTENT[tileIndex];
    const isFullscreen    = !!projectContent?.fullscreen;
    const gridW           = wrap.getBoundingClientRect().width;
    let targetL, targetW, targetH, targetT;
    if (isFullscreen) {
      targetL = 0; targetT = 0;
      targetW = window.innerWidth;
      // Mobile: 20% smaller so more content is visible without scrolling
      targetH = Math.round(window.innerHeight * (isMobile ? 0.384 : 0.48));
    } else {
      const baseW = gridW * 1.2;
      targetL = Math.round(window.innerWidth / 2 - baseW / 2);
      targetW = Math.round((window.innerWidth - targetL - 32) * 0.65);
      targetH = targetW * 9 / 16;
      targetT = titleBottomFinal + A;
    }

    // Fixed overlay lives at target position
    const overlay = document.createElement('div');
    overlay.id = 'project-overlay';
    Object.assign(overlay.style, {
      position:     'fixed',
      left:         `${targetL}px`,
      top:          `${targetT}px`,
      width:        `${targetW}px`,
      height:       `${targetH}px`,
      borderRadius: '8px', // always start at tile radius; fullscreen transitions to 0 near end
      overflow:     'hidden',
      zIndex:       '50',
      willChange:   'transform',
    });

    // Move actual <video> into overlay — playback continues uninterrupted
    if (vid) {
      Object.assign(vid.style, {
        position:       'absolute', inset: '0',
        width:          '100%', height: '100%',
        objectFit:      'cover', opacity: '1',
        objectPosition: 'center 50%',
      });
      overlay.appendChild(vid);
      vid.play();

      // Tile 1 (Far away from time): play to end then hard-cut to part 2.
      // Preload part 2 immediately so it's buffered and ready for an instant cut.
      if (tileIndex === 1) {
        vid.loop = false;
        const vid2 = document.createElement('video');
        vid2.src         = 'Far away from time 2.mp4';
        vid2.loop        = true;
        vid2.muted       = true;
        vid2.playsInline = true;
        vid2.setAttribute('playsinline', '');
        vid2.preload     = 'auto';
        Object.assign(vid2.style, {
          position:       'absolute', inset: '0',
          width:          '100%', height: '100%',
          objectFit:      'cover',
          objectPosition: 'center 30%',
          opacity:        '0',
        });
        overlay.appendChild(vid2);
        vid2.load(); // start buffering now

        vid.addEventListener('ended', () => {
          vid2.play().then(() => {
            vid2.style.opacity = '1'; // hard cut — no transition
            vid.style.opacity  = '0';
          }).catch(() => { vid2.style.opacity = '1'; vid.style.opacity = '0'; });
        }, { once: true });
      }
    }

    activeProjectTile = tile;
    document.body.appendChild(overlay);
    tile.style.opacity = '0'; // hide the now-empty tile slot

    // Push a history entry so browser back / trackpad swipe triggers closeProject
    if (pushHistory) history.pushState({ projectView: true }, '');

    overlay.style.cursor = 'pointer';
    overlay.addEventListener('click', () => history.back());

    // FLIP: transform overlay so it visually starts at the tile's current screen rect
    const dx = tileRect.left + tileRect.width  / 2 - (targetL + targetW / 2);
    const dy = tileRect.top  + tileRect.height / 2 - (targetT + targetH / 2);
    const sx = tileRect.width  / targetW;
    const sy = tileRect.height / targetH;
    overlay.style.transformOrigin = 'center center';
    overlay.style.transform = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;

    // Other tiles scatter further and fade out
    const W = wrap.offsetWidth, H = wrap.offsetHeight;
    tiles.forEach((t, i) => {
      if (t === tile) return;
      t.style.transition = 'opacity 0.4s ease, translate 0.7s cubic-bezier(0.22,1,0.36,1)';
      t.style.opacity    = '0';
      const d = DIRS[i];
      t.style.translate  = `${d.x * W * 0.55}px ${d.y * H * 0.55}px`;
    });

    // Dismiss row labels and clear stale hover state so re-entry is clean
    rowLabels.forEach(row => {
      row.hovered.clear();
      row.el.classList.remove('visible');
    });

    // Play the FLIP animation to target.
    // For fullscreen: border-radius transitions from 8px → 0 with a delay so it only
    // starts squaring off in the final third of the animation (0.55s delay, 0.3s duration).
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (isFullscreen) {
          overlay.style.transition = 'transform 0.85s cubic-bezier(0.22, 1, 0.36, 1), border-radius 0.28s ease 0.5s';
          overlay.style.borderRadius = '0';
          // Pan video upward during FLIP; per-tile target position can be overridden
          if (vid) {
            const panTarget = tileIndex === 7 ? 'center 35%' : 'center 30%';
            vid.style.transition     = 'object-position 0.85s ease';
            vid.style.objectPosition = panTarget;
          }
        } else {
          overlay.style.transition = 'transform 0.85s cubic-bezier(0.22, 1, 0.36, 1), border-radius 0.5s ease';
        }
        overlay.style.transform = 'none';
      });
    });

    // Fullscreen: build content 350 ms into the FLIP so it arrives before the video lands
    if (isFullscreen && projectContent) {
      setTimeout(() => {
        const scrollEl = document.createElement('div');
        scrollEl.id = 'project-scroll';
        Object.assign(scrollEl.style, {
          position: 'fixed', inset: '0', overflowY: 'auto', zIndex: '48',
          // Touch devices need pointer-events for native scrolling; desktop uses wheel forwarding
          pointerEvents: (isMobile || isTablet) ? 'auto' : 'none'
        });
        // Reserve space for the overlay (which arrives at onOverlayLanded)
        scrollEl.style.paddingTop = `${targetH}px`;

        const contentEl = document.createElement('div');
        contentEl.id = 'project-content';
        Object.assign(contentEl.style, { width: '100%', pointerEvents: 'auto' });
        const footerIcons = `
          <a href="mailto:tsvyatkov.deyan@gmail.com" title="Email">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
          </a>
          <a href="https://instagram.com/here.is.dino" target="_blank" rel="noopener noreferrer" title="Instagram">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
          </a>`;
        contentEl.innerHTML = buildProjectHTML(projectContent) +
          `<div class="project-footer">${footerIcons}</div>`;
        scrollEl.appendChild(contentEl);
        document.body.appendChild(scrollEl);

        // Measure and animate content in
        requestAnimationFrame(() => {
          const ease      = 'cubic-bezier(0.22, 1, 0.36, 1)';
          const titleEl   = contentEl.querySelector('.credits-panel-title');

          if (isMobile) {
            // Mobile: single column — everything fades + slides up
            contentEl.style.opacity   = '0';
            contentEl.style.transform = 'translateY(24px)';
            contentEl.style.transition = 'none';
            requestAnimationFrame(() => {
              contentEl.style.transition = `opacity 0.4s ease, transform 0.5s ${ease}`;
              contentEl.style.opacity   = '1';
              contentEl.style.transform = 'none';
            });
          } else {
            // Desktop: two-column fly-in (left from left, right from right)
            const leftCol   = contentEl.querySelector('.project-below-left');
            const rightCol  = contentEl.querySelector('.project-below-right');
            const creditLines = leftCol ? leftCol.querySelectorAll('p:not(.credits-panel-title)') : [];

            if (titleEl && rightCol && leftCol) {
              const titleRect      = titleEl.getBoundingClientRect();
              const colRect        = leftCol.getBoundingClientRect();
              const titleMarginBot = parseFloat(getComputedStyle(titleEl).marginBottom);
              rightCol.style.paddingTop = `${titleRect.bottom - colRect.top + titleMarginBot}px`;
            }

            const leftEls = titleEl ? [titleEl, ...creditLines] : [...creditLines];
            leftEls.forEach(p => { p.style.opacity = '0'; p.style.transform = 'translateX(-48px)'; p.style.transition = 'none'; });
            if (rightCol) { rightCol.style.opacity = '0'; rightCol.style.transform = 'translateX(48px)'; rightCol.style.transition = 'none'; }

            requestAnimationFrame(() => {
              leftEls.forEach(p => { p.style.transition = `opacity 0.5s ease, transform 0.65s ${ease}`; p.style.opacity = '1'; p.style.transform = 'none'; });
              if (rightCol) { rightCol.style.transition = `opacity 0.5s ease, transform 0.65s ${ease}`; rightCol.style.opacity = '1'; rightCol.style.transform = 'none'; }
            });
          }
        });
      }, 350);
    }

    // On FLIP complete: wire up scroll/wheel and equalise margins
    if (projectContent) {
      function onOverlayLanded(e) {
        if (e.propertyName !== 'transform') return;
        overlay.removeEventListener('transitionend', onOverlayLanded);
        overlay.style.transition = 'none';
        overlay.style.transform  = 'translateZ(0)'; // stay on GPU layer to avoid repaint artifact

        // Non-fullscreen: create content now
        if (!isFullscreen) {
          const r = overlay.getBoundingClientRect();
          const scrollEl = document.createElement('div');
          scrollEl.id = 'project-scroll';
          Object.assign(scrollEl.style, { position: 'fixed', inset: '0', overflowY: 'auto', zIndex: '48', pointerEvents: 'none' });
          const spacerEl = document.createElement('div');
          spacerEl.style.height = `${r.bottom + 48}px`;
          const contentEl = document.createElement('div');
          contentEl.id = 'project-content';
          Object.assign(contentEl.style, { marginLeft: `${r.left}px`, width: `${r.width}px`, paddingBottom: '96px', opacity: '0', transition: 'opacity 0.2s ease', pointerEvents: 'auto' });
          contentEl.innerHTML = projectContent.description || '';
          scrollEl.appendChild(spacerEl);
          scrollEl.appendChild(contentEl);
          document.body.appendChild(scrollEl);
          requestAnimationFrame(() => requestAnimationFrame(() => { contentEl.style.opacity = '1'; }));
        }

        // Desktop + tablet: move overlay into scroll container so video scrolls with content.
        // Mobile only: overlay stays position:fixed (paddingTop on scrollEl acts as spacer).
        const scrollEl = document.getElementById('project-scroll');
        if (isFullscreen && scrollEl && !isMobile) {
          scrollEl.style.paddingTop = ''; // overlay takes that space now
          Object.assign(overlay.style, {
            position:      'relative',
            top:           '', left:    '',
            width:         '100%',
            height:        `${targetH}px`,
            zIndex:        '',
            willChange:    '',
            pointerEvents: 'auto',
            cursor:        'pointer',
          });
          scrollEl.insertBefore(overlay, scrollEl.firstChild);
        }

        // Forward vertical wheel events to the scroll container.
        // Horizontal events (trackpad back/forward swipe) are left alone so the
        // browser can still handle navigation gestures.
        function docWheelForward(e) {
          if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return; // horizontal — let browser handle
          const sc = document.getElementById('project-scroll');

      }

  const DIRS = [
    { x: -1, y: -1 }, { x:  0, y: -1 }, { x:  1, y: -1 },
    { x: -1, y:  0 }, { x:  0, y:  0 }, { x:  1, y:  0 },
    { x: -1, y:  1 }, { x:  0, y:  1 }, { x:  1, y:  1 },
  ];

  const RATIO_START = 1.501;
  const RATIO_END   = 1.7778;
  // Vertical offset so top margin (above name) equals bottom margin (below bottom tiles).
  // Derivation: total_shift = nameBottom_gap + name_height ≈ 72 + ~28px = 100px;
  // GRID_Y_OFFSET = total_shift − bottomShift = 100 − 0.025·innerHeight

  let progress = 0;
  let rafId = null;
  let growTimers = [];
  window.__scatterProgress = 0;

  function applyScatter(p) {
    window.__scatterProgress = p;
    const H = wrap.offsetHeight;
    // Mobile uses 8/9 so each tile in the 2-col × 3-row grid lands at 4:3
    const ratioEnd = isMobile ? (8 / 9) : RATIO_END;
    const ratio = RATIO_START + (ratioEnd - RATIO_START) * p;
    const W = isMobile ? Math.min(H * ratio, window.innerWidth * 0.96) : H * ratio;
    wrap.style.width = `${W}px`;
    const dist = window.__scatterEnergy || 0.15;

    // Tiles scatter outward; grid drifts down slightly for vertical balance.
    // On mobile the col-2 tiles are hidden — use symmetric DIRS so the 2-column
    // grid stays centred (tiles 1/4/7 scatter right instead of staying in place).
    const MOBILE_DIRS = [
      { x: -1, y: -1 }, { x:  1, y: -1 }, { x:  0, y: -1 },
      { x: -1, y:  0 }, { x:  1, y:  0 }, { x:  0, y:  0 },
      { x: -1, y:  1 }, { x:  1, y:  1 }, { x:  0, y:  1 },
    ];
    const dirs = isMobile ? MOBILE_DIRS : DIRS;
    // On mobile, scale horizontal scatter so column gap = row gap:
    // col_gap = 2·W·distX  row_gap = H·dist  → equal when distX = H·dist/(2·W)
    const distX = isMobile ? dist * H / (2 * W) : dist;
    const bottomShift = H * dist * 0.4 * p;
    tiles.forEach((tile, i) => {
      tile.style.translate = `${dirs[i].x * W * distX * p}px ${dirs[i].y * H * dist * p}px`;
    });
    wrap.style.transform = `translateY(${bottomShift + GRID_Y_OFFSET * p}px)`;

    // Assembled overlay fades out as tiles scatter (gone by p=0.5)
    tileGrid.style.setProperty('--assembled-opacity', String(Math.max(0, 1 - p * 2)));
    // Video tiles crossfade from portrait → first frame as scatter progresses
    video.style.opacity  = String(p);
    video2.style.opacity = String(p);
    video3.style.opacity = String(p);
    video4.style.opacity = String(p);
    video5.style.opacity = String(p);
    video6.style.opacity = String(p);
    video7.style.opacity = String(p);
    video8.style.opacity = String(p);
    video9.style.opacity = String(p);

    // Gap between tiles grows with scatter progress
    tileGrid.style.gap = `${Math.round(p * (isMobile ? 1 : 10))}px`;

    // Keep row labels glued to their anchor tiles while visible
    rowLabels.forEach(row => {
      if (row.el.classList.contains('visible')) positionRowLabel(row);
    });

    // Name rises from below into place above grid, left-aligned.
    // Bottom offset grows to clear the top tiles as they move up.
    const topTileUp = H * dist * p;
    const nameBottom = 68 + topTileUp + 4;
    const nameY = 80 * (1 - p);
    nameEl.style.bottom = `calc(100% + ${nameBottom}px)`;
    nameEl.style.opacity = p;
    nameEl.style.transform = `translateX(-50%) translateY(${nameY}px)`;

    const subtitleBottom = nameBottom - 38;
    subtitleEl.style.bottom = `calc(100% + ${subtitleBottom}px)`;
    subtitleEl.style.opacity = p;
    subtitleEl.style.transform = `translateX(-50%) translateY(${nameY}px)`;

    subtitleAboutEl.style.bottom = `calc(100% + ${subtitleBottom}px)`;

    const footerEl = document.getElementById('site-footer');
    if (footerEl) {
      const footerY = window.innerHeight * 0.4 * (1 - p);
      footerEl.style.opacity       = String(p);
      footerEl.style.transform     = `translateX(-50%) translateY(-${footerY}px)`;

      { tile: videoTile,  vid: video  },
      { tile: videoTile2, vid: video2 },
      { tile: videoTile3, vid: video3 },
      { tile: videoTile4, vid: video4 },
      { tile: videoTile5, vid: video5 },
      { tile: videoTile6, vid: video6 },
      { tile: videoTile7, vid: video7 },
      { tile: videoTile8, vid: video8 },
      { tile: videoTile9, vid: video9 },
    ];

        const poster = vid.getAttribute('poster');

            inner.style.backgroundImage    = `url('${poster}')`;
            inner.style.backgroundSize     = 'cover';
            inner.style.backgroundPosition = 'center';
          }

          fadeOthers(tile);

          vid.pause();
          if (inner) inner.style.backgroundImage = '';

        tile.addEventListener('mouseleave', leave, { signal });

              inner.style.backgroundSize     = 'cover';
              inner.style.backgroundPosition = 'center';
            }

      row.tilesInRow.forEach(tile => {

          // since the anchor tile's scaled rect would cause a jump between thumbnails.

        const leave = () => {
          row.hovered.delete(tile);
          if (row.hovered.size === 0) {
            hideTimer = setTimeout(() => row.el.classList.remove('visible'), 200);
          }
        };

        tile.addEventListener('mouseleave', leave, { signal });

    // Desktop only: click → enter project view (touch devices use two-tap)
    if (!isMobile && !isTablet) {
      tiles.forEach(t => {
        t.addEventListener('click', () => openProject(t), { signal });
      });
    }

    // Name/subtitle hover animation disabled — re-enable later

    wrap.removeEventListener('mouseenter', onMouseEnter);
    window.removeEventListener('wheel', onWheel);
    window.removeEventListener('touchmove', onTouchMove);

    cancelAnimationFrame(rafId);
    function step() {
      const ease = window.__scatterEase || 0.075;
      progress += (1 - progress) * ease;

        progress = 1;
        applyScatter(1);
        tiles.forEach(t => t.classList.add('scattered'));

        return;

      applyScatter(progress);
      if (progress > 0.05) tiles.forEach(t => t.classList.add('scattered'));

    progress = 0;

      row.hovered.clear();
      row.el.classList.remove('visible');

      t.classList.remove('scattered');

      t.style.translate  = '';
      t.style.scale      = '';

    video.style.opacity = '0';
    video2.pause();
    video2.currentTime   = 0;
    video2.style.opacity = '0';
    video3.pause();
    video3.currentTime   = 0;
    video3.style.opacity = '0';
    video4.pause();
    video4.currentTime   = 0;
    video4.style.opacity = '0';
    video5.pause();
    video5.currentTime   = 0;
    video5.style.opacity = '0';
    video6.pause();
    video6.currentTime   = 0;
    video6.style.opacity = '0';
    video7.pause();
    video7.currentTime   = 0;
    video7.style.opacity = '0';
    video8.pause();
    video8.currentTime   = 0;
    video8.style.opacity = '0';
    video9.pause();
    video9.currentTime   = 0;
    video9.style.opacity = '0';
    tileGrid.style.filter = '';
    tileGrid.style.setProperty('--assembled-opacity', '1');
    wrap.style.transform = '';
    wrap.style.width = `${wrap.offsetHeight * RATIO_START}px`;
    window.__scatterProgress = 0;
    tileGrid.style.gap = '0px';
    nameEl.style.opacity = '0';
    nameEl.style.transform = 'translateX(-50%) translateY(80px)';
    nameEl.style.bottom = 'calc(100% + 68px)';
    if (nameInnerEl) nameInnerEl.style.transform = '';
    subtitleAboutEl.style.opacity   = '0';
    subtitleAboutEl.style.transform = 'translateX(calc(-50% + 50px)) translateY(80px)';
    const footerEl = document.getElementById('site-footer');
    if (footerEl) {
      footerEl.style.opacity       = '0';
      footerEl.style.transform     = `translateX(-50%) translateY(-${window.innerHeight * 0.4}px)`;

    }
    wrap.addEventListener('mouseenter', onMouseEnter);
    window.addEventListener('wheel', onWheel, { passive: true });
    window.addEventListener('touchmove', onTouchMove, { passive: true });
  };

  function onMouseEnter() { scatter(); }
  function onWheel(e) { if (e.deltaY > 10) scatter(); }
  let touchY0 = null;
  function onTouchMove(e) {

  // If the user hasn't hovered within 3 s, scatter fires automatically.
  const autoScatterTimer = setTimeout(() => scatter(), 4000);

  setTimeout(() => {
    if (isMobile || isTablet) {
      // Touch devices: tap on the portrait triggers scatter
      wrap.addEventListener('touchend', (e) => {
        e.preventDefault();
        clearTimeout(autoScatterTimer);
        scatter();
      }, { once: true, passive: false });
    } else {
      wrap.addEventListener('mouseenter', onMouseEnter);
      window.addEventListener('wheel', onWheel, { passive: true });
      window.addEventListener('touchmove', onTouchMove, { passive: true });
      // If the cursor was already over the portrait when the delay expired, scatter now
      if (wrap.matches(':hover')) { clearTimeout(autoScatterTimer); scatter(); }

    const cancelAuto = () => clearTimeout(autoScatterTimer);
    window.addEventListener('touchend',  cancelAuto, { once: true, passive: true });
    window.addEventListener('wheel',     cancelAuto, { once: true, passive: true });

  window.addEventListener('popstate', (e) => {
    if (isProjectView) {
      // Going back: close project view
      closeProject();
    } else if (e.state?.projectView && lastProjectTile && hasScattered) {
      // Going forward: re-open the last project (state already restored, skip pushState)
      openProject(lastProjectTile, false);
    }
  });
});

  return React.createElement(TweakRow, { label },
    React.createElement('div', { ref: trackRef, role: 'radiogroup', onPointerDown, className: dragging ? 'twk-seg dragging' : 'twk-seg' },
      React.createElement('div', { className: 'twk-seg-thumb', style: { left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` } }),
      opts.map(o => React.createElement('button', { key: o.value, type: 'button', role: 'radio', 'aria-checked': o.value===value }, o.label))
    )
  );
}

function TweakButton({ label, onClick, secondary=false }) {
  return React.createElement('button', { type: 'button', className: secondary ? 'twk-btn secondary' : 'twk-btn', onClick }, label);
}

// Mount tweaks
(function mountTweaks() {
  if (!document.getElementById('tweaks-root') || typeof useTweaks === 'undefined') {
    setTimeout(mountTweaks, 50);
    return;
  }

  const TWEAK_DEFAULTS = {
    mood: 'Haze',
    scatterEnergy: 10,
    portraitScale: 'Intimate'
  };

  const MOODS = {
    Stark: { bg: '#e4e4e2', overlay: '#050505', nameColor: '#111',    cursor: '#111'    },
    Warm:  { bg: '#c4bfb8', overlay: '#1a1712', nameColor: '#1a1712', cursor: '#1a1712' },
    Haze:  { bg: '#ccc5ba', overlay: '#2a1f14', nameColor: '#3d2f1e', cursor: '#3d2f1e' },
  };
  const SCALES = { Intimate: '36vh', Standard: '48vh', Monumental: '62vh' };

  function applyTweaks(t) {
    const mood  = MOODS[t.mood] || MOODS.Haze;
    const scale = SCALES[t.portraitScale] || SCALES.Intimate;
    const energy = t.scatterEnergy / 100;

    document.documentElement.style.setProperty('--bg-color', mood.bg);
    document.documentElement.style.setProperty('--overlay-color', mood.overlay);
    document.body.style.background = mood.bg;

    const nameEl = document.getElementById('name');
    if (nameEl) nameEl.style.color = mood.nameColor;

    const cursorEl = document.getElementById('cursor');
    if (cursorEl) cursorEl.style.background = mood.cursor;

    const wrapEl = document.getElementById('portrait-wrap');
    if (wrapEl) {
      wrapEl.style.height = scale;
      const heightPx = parseFloat(scale) / 100 * window.innerHeight;
      const ratio = 1.501 + (1.7778 - 1.501) * (window.__scatterProgress || 0);
      wrapEl.style.width = `${heightPx * ratio}px`;
    }

    window.__scatterEnergy = 0.06 + energy * 0.18;
    window.__scatterEase   = 0.045 + energy * 0.085;
  }

  applyTweaks(TWEAK_DEFAULTS);

  function TweaksApp() {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
    React.useEffect(() => { applyTweaks(tweaks); }, [tweaks]);
    return React.createElement(TweaksPanel, null,
      React.createElement(TweakSection, { label: 'Mood' }),
      React.createElement(TweakRadio, { options: ['Stark','Warm','Haze'], value: tweaks.mood, onChange: v => setTweak('mood', v) }),
      React.createElement(TweakSection, { label: 'Scatter energy' }),
      React.createElement(TweakSlider, { label: 'Energy', min: 10, max: 100, step: 1, value: tweaks.scatterEnergy, onChange: v => setTweak('scatterEnergy', v) }),
      React.createElement(TweakSection, { label: 'Portrait scale' }),
      React.createElement(TweakRadio, { options: ['Intimate','Standard','Monumental'], value: tweaks.portraitScale, onChange: v => setTweak('portraitScale', v) }),
      React.createElement(TweakSection, { label: 'Preview' }),
      React.createElement(TweakButton, { label: 'Reset scatter', onClick: () => window.__resetScatter && window.__resetScatter() })
    );
  }

  ReactDOM.createRoot(document.getElementById('tweaks-root')).render(React.createElement(TweaksApp));
})();
</script>
</body>
</html>
